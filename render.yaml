services:
  - type: web
    name: revyvas-crm
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: PAYMENT_PROVIDER
        value: mercado_pago
      - key: PAYMENT_SECRET_KEY
        sync: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
